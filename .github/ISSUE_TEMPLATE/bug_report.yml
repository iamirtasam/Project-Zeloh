name: Bug Report
description: Report a problem with Zeloh
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a report. Please fill out the sections below.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - User app (frontend)
        - Admin panel
        - Backend API
        - Database / migrations
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser, Node version, etc.
